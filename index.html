<style>
/* ===== 明亮暗色 ===== */
:root {
  --bg: #0f1220;
  --card: #181b2f;
  --border: #2a2f4a;
  --blue: #3b82f6;
  --cyan: #22d3c3;
  --red: #ff5f7f;
  --text: #eef2ff;
  --muted: #9aa3bf;
}

/* ===== 基础 ===== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "Microsoft YaHei", sans-serif;
}
body {
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
}

/* ===== 扫描线 ===== */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    repeating-linear-gradient(
      transparent,
      transparent 4px,
      rgba(0,0,0,.2) 4px,
      rgba(0,0,0,.2) 6px
    );
  pointer-events: none;
  z-index: 9999;
}

/* ===== 代码雨 ===== */
#codeRain {
  position: fixed;
  inset: 0;
  z-index: 0;
  opacity: 0.08;
}

/* ===== 密码 ===== */
.pwd-mask {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.92);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10000;
}
.pwd-box {
  width: 92%;
  max-width: 400px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 28px 22px;
}
.pwd-box h2 {
  text-align: center;
  color: var(--blue);
  margin-bottom: 18px;
}
.pwd-box input {
  width: 100%;
  padding: 14px;
  background: #0b0e1a;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 14px;
  outline: none;
}
.pwd-box button {
  margin-top: 14px;
  width: 100%;
  padding: 13px;
  background: var(--blue);
  color: #000;
  border: none;
  border-radius: 6px;
  font-size: 14px;
}
.tip { height: 22px; color: var(--red); font-size: 13px; text-align: center; }

/* ===== 主内容 ===== */
.main {
  display: none;
  position: relative;
  z-index: 1;
  padding: 90px 4% 60px;
}

/* ===== 导航 ===== */
.nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: auto;
  background: rgba(24,27,47,.9);
  backdrop-filter: blur(10px);
  padding: 14px 4%;
  z-index: 99;
}
.logo {
  font-size: 18px;
  font-weight: 600;
  color: var(--blue);
  letter-spacing: 2px;
}

/* ===== 订单统计 ===== */
.order-counter {
  font-size: 12px;
  color: var(--muted);
  margin-top: 4px;
  line-height: 1.6;
}
.order-counter span {
  color: var(--cyan);
  font-weight: 600;
  font-size: 14px;
}
.order-tip {
  font-size: 11px;
  color: #6b7280;
}

/* ===== 头部 ===== */
.header {
  text-align: center;
  margin-bottom: 30px;
  margin-top: 50px;
}
.header h1 {
  font-size: 28px;
  letter-spacing: 3px;
  color: var(--blue);
  
}
.header p {
  margin-top: 12px;
  font-size: 14px;
  color: var(--muted);
}

/* ===== 卡片 ===== */
.section-title {
  font-size: 15px;
  padding-left: 10px;
  border-left: 3px solid var(--blue);
  margin: 34px 0 16px;
  color: var(--muted);
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 16px;
}
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
  text-decoration: none;
  color: inherit;
}
.card:hover {
  border-color: var(--blue);
}
.svg {
  width: 100%;
  height: 160px;
  margin-bottom: 16px;
}
.svg svg {

  height: 100%;
}
.card h3 {

}
.card p {

  color: var(--muted);
}
.buy {

.download {

footer {

</style>

<script>
/* ===== 订单数字（你只改这里） ===== */
let ORDER_COUNT = 0;

function animateOrderCount() {
  const el = document.getElementById("orderNum");
  let current = 0;
  const step = Math.ceil(ORDER_COUNT / 60);
  const timer = setInterval(() => {
    current += step;
    if (current >= ORDER_COUNT) {
      current = ORDER_COUNT;
      clearInterval(timer);
    }
    el.innerText = current.toLocaleString();
  }, 20);
}

/* ===== 密码 ===== */
const PWD = "112233";
function check() {
  const v = pwd.value.trim();
  if (v === PWD) {
    mask.style.display = "none";
    app.style.display = "block";
    localStorage.setItem("sk", Date.now());
    setTimeout(animateOrderCount, 200);
  } else {
    tip.innerText = "访问被拒绝";
  }
}
window.onload = () => {
  if (localStorage.getItem("sk")) {
    mask.style.display = "none";
    app.style.display = "block";
    setTimeout(animateOrderCount, 200);
  }
};

/* ===== 代码雨 ===== */
const c = document.getElementById("codeRain");
const ctx = c.getContext("2d");
function resize() {
  c.width = innerWidth;
  c.height = innerHeight;
}
resize();
addEventListener("resize", resize);

const chars = "01アイウエオカキクケコ∇∷∸∹∺∻∽∾≀≁";
const fs = 14;
let drops = Array(Math.floor(innerWidth / fs)).fill(1);

function draw() {
  ctx.fillStyle = "rgba(0,0,0,.08)";
  ctx.fillRect(0,0,c.width,c.height);
  ctx.fillStyle = "#3b82f6";
  ctx.font = fs + "px monospace";
  drops.forEach((y,i)=>{
    ctx.fillText(chars[Math.floor(Math.random()*chars.length)], i*fs, y*fs);
    drops[i] = y*fs > c.height && Math.random() > 0.975 ? 0 : y+1;
  });
  requestAnimationFrame(draw);
}
draw();
</script>
