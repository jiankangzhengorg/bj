<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>查询结果 - 个人</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background-color: #f5f5f5;
            user-select: none;
            -webkit-user-select: none;
            overflow-x: hidden;
        }
        .header-bar {
            background-color: #2196F3;
            color: #fff;
            font-size: 17px;
            text-align: center;
            padding: 10px 0;
        }

        /* 银行卡比例：宽高接近银行卡，只略大一点 */
        .card-flip {
            width: 92%;
            max-width: 400px;
            margin: 10px auto;
            position: relative;
            /* 银行卡标准比例高度 */
            min-height: 250px;
            perspective: 1000px;
            cursor: pointer;
        }
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            min-height: 250px;
            backface-visibility: hidden;
            transition: transform 0.6s ease;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.12);
            overflow: hidden;
        }
        .card-front {
            background: #fff;
            transform: rotateY(0deg);
        }
        .card-back {
            background: #fff;
            transform: rotateY(180deg);
            padding: 15px 18px;
        }
        .card-flip.active .card-front {
            transform: rotateY(-180deg);
        }
        .card-flip.active .card-back {
            transform: rotateY(0deg);
        }

        /* 双层波浪 缩小高度 */
        .wave-bottom {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50px;
            z-index: 1;
        }
        .wave-bottom svg {
            width: 100%;
            height: 100%;
        }

        .card-content {
            display: flex;
            padding: 15px 12px;
            position: relative;
            z-index: 2;
            align-items: center;
        }
        .photo-area {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 10px;
            flex-shrink: 0;
        }
        .photo-area img {
            width: 65px !important;
            border-radius: 6px;
        }
        .info-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-width: 0;
        }
        .card-title {
            font-size: 16px;
            color: #2196F3;
            text-align: center;
            margin-bottom: 10px;
            font-weight: 500;
            width: 100%;
        }
        .info-row {
            display: flex;
            align-items: center;
            margin-bottom: 4px;
            font-size: 12.5px;
            white-space: nowrap !important;
            width: 100%;
        }
        .info-label {
            width: 58px;
            color: #2196F3;
            font-weight: 500;
            text-align: right;
            padding-right: 4px;
            flex-shrink: 0;
        }
        .info-value {
            color: #333;
            white-space: nowrap !important;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .valid-tag {
            position: absolute;
            top: 10px;
            right: -32px;
            background: #0da84d;
            color: #fff;
            font-size: 12px;
            padding: 2px 32px;
            transform: rotate(45deg);
            font-weight: bold;
            z-index: 3;
        }

        .back-title {
            font-size: 17px;
            color: #2196F3;
            margin-bottom: 12px;
            font-weight: bold;
            text-align: center;
        }
        .back-content {
            font-size: 12px;
            color: #333;
            line-height: 1.6;
        }

        /* 小屏iPhone 8 极致适配 */
        @media screen and (max-width: 380px) {
            .card-flip{
                min-height: 240px;
                max-width: 360px;
            }
            .card-front,.card-back{
                min-height: 240px;
            }
            .card-content {
                padding: 12px 8px;
            }
            .photo-area img {
                width: 58px !important;
            }
            .info-row {
                font-size: 12px;
            }
            .info-label {
                width: 52px;
            }
        }
    </style>
</head>

<body oncontextmenu="return false;" onselectstart="return false;">

    <div class="header-bar">庄邓查询结果 - 个人</div>

    <div class="card-flip" onclick="this.classList.toggle('active')">
        <div class="card-front">
            <div class="wave-bottom">
                <!-- 双层波浪 -->
                <svg viewBox="0 0 400 50" preserveAspectRatio="none">
                    <path d="M0,15 Q100,5 200,18 T400,15 V50 H0 Z" fill="#87E8DE"></path>
                    <path d="M0,28 Q100,15 200,30 T400,26 V50 H0 Z" fill="#5CD8C9"></path>
                </svg>
            </div>
            <div class="valid-tag">有效</div>
            <div class="card-content">
                <div class="photo-area">
                    <img width="65" src="zd.png" style="display:block;border-radius:6px;">
                </div>
                <div class="info-area">
                    <div class="card-title">从业人员健康证明</div>
                    <div class="info-row"><div class="info-label">编　　号</div><div class="info-value">苏05673726</div></div>
                    <div class="info-row"><div class="info-label">姓　　名</div><div class="info-value">庄邓</div></div>
                    <div class="info-row"><div class="info-label">性　　别</div><div class="info-value">男</div></div>
                    <div class="info-row"><div class="info-label">年　　龄</div><div class="info-value">29</div></div>
                    <div class="info-row"><div class="info-label">体检机构</div><div class="info-value">南京医科大学第四附属医院</div></div>
                    <div class="info-row"><div class="info-label">有效日期</div><div class="info-value">2027年06月17日</div></div>
                    <div class="info-row">
                        <div class="info-label">身份证号</div>
                        <div class="info-value"> 32132319970302471X</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card-back">
            <div class="back-title">注意事项</div>
            <div class="back-content">
                1. 本证明仅表明持证人本次体检结果符合从业健康标准。<br>
                2. 本证明不得涂改、转借、伪造，违者依法追究责任。<br>
                3. 有效期内如出现健康异常，应立即停止从业并重新体检。<br>
                4. 本证明实行一人一证，仅限本人使用。<br>
                5. 本证明电子版与纸质版具有同等效力。
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = function (e) {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I') || (e.ctrlKey && e.key === 'U')) {
                return false;
            }
        };
        document.oncopy = function() { return false; }
    </script>

</body>
</html>
