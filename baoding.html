<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>从业人员健康证明</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background: #f2f2f2;
            padding: 10px;
        }
        /* 外层手机截图容器（模拟原图手机边框） */
        .phone-wrap {
            max-width: 420px;
            margin: 0 auto;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 12px #ccc;
        }
        /* 手机顶部状态栏 */
        .phone-status {
            height: 44px;
            background: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px;
            font-size: 14px;
            color: #333;
        }
        /* 页面头部：体检管理系统栏 */
        .sys-header {
            height: 60px;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .sys-header .close {
            position: absolute;
            left: 12px;
            font-size: 24px;
            color: #333;
        }
        .sys-title {
            text-align: center;
        }
        .sys-title h3 {
            font-size: 18px;
            color: #222;
        }
        .sys-title p {
            font-size: 12px;
            color: #666;
        }
        /* 医院顶部横幅 */
        .hospital-banner {
            height: 220px;
            background: linear-gradient(135deg, #48b4bc, #3099a0);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
        }
        .hospital-banner h1 {
            font-size: 42px;
            font-weight: bold;
            letter-spacing: 2px;
        }
        .hospital-banner p {
            font-size: 20px;
            margin-top: 6px;
        }
        /* 健康证主体卡片 */
        .cert-card {
            background: #e8f7fc;
            padding: 30px 20px;
            text-align: center;
        }
        .cert-card h2 {
            font-size: 24px;
            color: #333;
            margin-bottom: 24px;
            font-weight: 500;
        }
        /* 证件照片区域 */
        .avatar-box {
            width: 160px;
            height: 200px;
            margin: 0 auto 30px;
            background: #fff;
            border: 1px solid #ddd;
            overflow: hidden;
        }
        .avatar-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        /* 证件信息列表 */
        .info-list {
            text-align: left;
            width: 90%;
            margin: 0 auto;
        }
        .info-item {
            font-size: 18px;
            color: #222;
            margin: 14px 0;
            line-height: 1.6;
        }
        /* 底部医院渐变栏 */
        .footer-banner {
            height: 140px;
            background: linear-gradient(#e8f7fc, #3099a0);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
        }
        .footer-banner h2 {
            font-size: 36px;
            font-weight: bold;
        }
        .footer-banner p {
            font-size: 16px;
            margin: 6px 0 16px;
        }
        .tech-text {
            font-size: 11px;
            color: #eee;
        }
    </style>
</head>
<body>
    <div class="phone-wrap">
       
        <!-- 体检管理系统头部 -->
        <div class="sys-header">
            <span class="close">×</span>
            <div class="sys-title">
                <h3>体检管理系统</h3>
                <p>bdxhyyksy.boodcard.cn</p>
            </div>
        </div>
        <!-- 医院顶部横幅 -->
        <div class="hospital-banner">
            <h1>保定西湖医院</h1>
            <p>Bao Ding Xi Hu Yi Yuan</p>
        </div>
        <!-- 健康证明主体 -->
        <div class="cert-card">
            <h2>从业人员健康证明</h2>
            <!-- 照片框，替换src即可更换人像 -->
            <div class="avatar-box">
                <img src="ln.png" alt="证件照">
            </div>
            <!-- 证件信息，直接修改文字即可 -->
            <div class="info-list">
                <div class="info-item">编号：210001212268953</div>
                <div class="info-item">姓名：刘宁</div>
                <div class="info-item">性别：男</div>
                <div class="info-item">从业类别：食品</div>
                <div class="info-item">体检日期：2026年07月01日（有效期一年）</div>
                <div class="info-item">有效期止：2026年07月01日至2027年06月30日</div>
                <div class="info-item">体检单位：保定西湖医院</div>
            </div>
        </div>
        <!-- 底部医院栏 -->
        <div class="footer-banner">
            <h2>保定西湖医院</h2>
            <p>Bao Ding Xi Hu Yi Yuan</p>
            <div class="tech-text">技术支持：深圳市宝瑞迪科技有限公司 技术热线：137-6047-6896</div>
        </div>
    </div>
</body>
</html>
